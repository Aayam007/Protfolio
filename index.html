	<script>
		function loadMarkdown() {
			// Use embedded markdown content
			const fallbackEl = document.getElementById('md-fallback');
			return (fallbackEl && fallbackEl.textContent) ? fallbackEl.textContent : '';
		}

		async function renderMermaid(root) {
			const codeBlocks = root.querySelectorAll('pre > code');
			if (!codeBlocks.length) return;

			const mermaidBlocks = Array.from(codeBlocks).filter((code) => {
				const cls = (code.getAttribute('class') || '').toLowerCase();
				return cls.includes('language-mermaid') || cls.includes('mermaid');
			});

			// Only load Mermaid.js if there are mermaid diagrams (saves 679 KiB)
			if (!mermaidBlocks.length) return;

			// Lazy load Mermaid.js
			if (typeof mermaid === 'undefined') {
				await new Promise((resolve, reject) => {
					const script = document.createElement('script');
					script.src = 'https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js';
					script.onload = resolve;
					script.onerror = reject;
					document.head.appendChild(script);
				});
			}

			mermaid.initialize({
				startOnLoad: false,
				theme: 'dark',
				securityLevel: 'loose',
				flowchart: {
					// htmlLabels + <br/> often causes text-height mismeasurement and clipping
					// in embedded renderers. We render with SVG text instead.
					htmlLabels: false,
					padding: 10,
					nodeSpacing: 30,
					rankSpacing: 40
				},
				themeVariables: {
					fontSize: '16px',
					lineHeight: '1.35'
				}
			});

			for (let index = 0; index < mermaidBlocks.length; index++) {
				const code = mermaidBlocks[index];
				const pre = code.parentElement;
				let graphDefinition = (code.textContent || '').trim();
				// Normalize HTML line breaks in labels into real newlines for SVG text.
				graphDefinition = graphDefinition
					.replace(/<br\s*\/?>/gi, '\n')
					.replace(/<br\s*>/gi, '\n');
				const container = document.createElement('div');
				container.className = 'mermaid';

				try {
					const id = `mermaid-${index}-${Date.now()}`;
					const { svg } = await mermaid.render(id, graphDefinition);
					container.innerHTML = svg;
				} catch (error) {
					// If Mermaid fails to parse, keep the original text visible
					container.textContent = graphDefinition;
					container.style.whiteSpace = 'pre-wrap';
				}

				pre.replaceWith(container);
			}

			});

			const html = marked.parse(markdown);
			const content = document.getElementById('content');
			content.innerHTML = html;

			// Highlight code immediately for better perceived performance
			highlightCode(content);

			// Defer Mermaid rendering until browser is idle (non-blocking, saves 679 KiB from critical path)
			if ('requestIdleCallback' in window) {
				requestIdleCallback(() => renderMermaid(content), { timeout: 2000 });
			} else {
				// Fallback for browsers without requestIdleCallback
				setTimeout(() => renderMermaid(content), 1000);
			}
		})();
	</script>
</body>
